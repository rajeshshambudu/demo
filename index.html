<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Happy Telangana Formation Day | Dream Ladders</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    font-family:'Poppins',sans-serif;

    overflow-x:hidden;
    overflow-y:auto;

    min-height:100svh;

    background:
    linear-gradient(
    135deg,
    #0e2347 0%,
    #173b74 25%,
    #1f4d8f 45%,
    #111111 65%,
    #5d1717 100%
    );

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
    color:white;

    padding:20px;
}

/* Animated Overlay */

body::before{

    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at top left,
    rgba(255,255,255,0.08),
    transparent 35%),

    radial-gradient(circle at bottom right,
    rgba(255,255,255,0.08),
    transparent 35%);

    animation:bgMove 8s ease-in-out infinite alternate;

    z-index:0;
}

@keyframes bgMove{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }
}

/* Glows */

.glow{

    position:absolute;

    border-radius:50%;

    filter:blur(80px);

    opacity:0.35;

    animation:float 10s ease-in-out infinite;
}

.glow1{

    width:350px;
    height:350px;

    background:#1f4d8f;

    top:-100px;
    left:-100px;
}

.glow2{

    width:280px;
    height:280px;

    background:#7a2020;

    bottom:-80px;
    right:-80px;

    animation-duration:14s;
}

@keyframes float{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-35px);
    }
}

/* Floating Particles */

.particle{

    position:absolute;

    width:6px;
    height:6px;

    border-radius:50%;

    background:rgba(255,255,255,0.5);

    animation:particles 12s linear infinite;
}

@keyframes particles{

    from{
        transform:translateY(100vh);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Main Card */

.container{

    width:100%;
    max-width:900px;

    padding:55px 35px;

    text-align:center;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.15);

    backdrop-filter:blur(16px);

    border-radius:30px;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    inset 0 0 20px rgba(255,255,255,0.05);

    position:relative;
    z-index:5;

    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Logo */

.logo{

    width:120px;
    height:120px;

    object-fit:contain;

    margin-bottom:25px;

    animation:logoFloat 4s ease-in-out infinite;

    filter:
    drop-shadow(0 0 20px rgba(255,255,255,0.25));
}

@keyframes logoFloat{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }
}

/* Brand */

.brand{

    letter-spacing:5px;

    font-size:14px;

    margin-bottom:20px;

    opacity:0.9;

    font-weight:600;
}

/* Heading */

h1{

    font-size:clamp(2.8rem,7vw,5.5rem);

    line-height:1.15;

    margin-bottom:22px;

    font-weight:800;

    background:
    linear-gradient(
    90deg,
    #ffffff,
    #dce8ff,
    #ffffff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 30px rgba(255,255,255,0.15);

    animation:glowText 3s ease-in-out infinite alternate;
}

@keyframes glowText{

    from{
        filter:brightness(1);
    }

    to{
        filter:brightness(1.25);
    }
}

/* Description */

p{

    max-width:700px;

    margin:auto;

    line-height:1.9;

    font-size:1.08rem;

    opacity:0.95;

    margin-bottom:40px;
}

.highlight{

    color:#8dc0ff;

    font-weight:700;
}

/* Button */

.button{

    border:none;

    padding:17px 42px;

    border-radius:60px;

    font-size:1rem;

    font-weight:700;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(
    135deg,
    #173b74,
    #1f4d8f,
    #7a2020
    );

    box-shadow:
    0 8px 30px rgba(0,0,0,0.35);

    transition:0.35s ease;

    position:relative;

    overflow:hidden;
}

.button:hover{

    transform:
    translateY(-5px)
    scale(1.04);

    box-shadow:
    0 12px 40px rgba(0,0,0,0.4);
}

.button::before{

    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:100%;
    height:100%;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.3),
    transparent
    );

    transition:0.6s;
}

.button:hover::before{

    left:120%;
}

/* Footer */

.footer{

    margin-top:35px;

    font-size:14px;

    opacity:0.8;

    letter-spacing:1px;
}

/* Flower Burst */

.flower{

    position:fixed;

    font-size:28px;

    pointer-events:none;

    z-index:9999;

    animation:burst 3s linear forwards;
}

@keyframes burst{

    0%{

        transform:
        translate(0,0)
        scale(0.5)
        rotate(0deg);

        opacity:1;
    }

    100%{

        transform:
        translate(var(--x), var(--y))
        scale(1.8)
        rotate(360deg);

        opacity:0;
    }
}

/* Mobile Responsive */

@media(max-width:768px){

    body{
        padding:18px;
        align-items:flex-start;
    }

    .container{

        margin-top:30px;
        margin-bottom:30px;

        padding:35px 22px;

        border-radius:24px;
    }

    h1{

        font-size:2.5rem;

        line-height:1.2;

        margin-bottom:18px;
    }

    p{

        font-size:0.95rem;

        line-height:1.7;

        margin-bottom:32px;
    }

    .logo{

        width:85px;
        height:85px;
    }

    .brand{

        font-size:12px;

        letter-spacing:3px;
    }

    .button{

        width:100%;

        padding:16px 20px;

        font-size:1rem;
    }

    .footer{

        font-size:12px;
    }

    .glow1{
        width:220px;
        height:220px;
    }

    .glow2{
        width:180px;
        height:180px;
    }
}

</style>

</head>

<body>

<!-- Background Glow -->

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<!-- Floating Particles -->

<div class="particle" style="left:10%; animation-delay:0s;"></div>
<div class="particle" style="left:20%; animation-delay:2s;"></div>
<div class="particle" style="left:35%; animation-delay:4s;"></div>
<div class="particle" style="left:55%; animation-delay:1s;"></div>
<div class="particle" style="left:70%; animation-delay:5s;"></div>
<div class="particle" style="left:85%; animation-delay:3s;"></div>

<!-- Main Card -->

<div class="container">

    <!-- YOUR LOGO -->

    <img
    src="logo.png"
    alt="Dream Ladders Logo"
    class="logo"
    >

    <div class="brand">
        DREAM LADDERS
    </div>

    <h1>
        Happy Telangana<br>
        Formation Day ❤️
    </h1>

    <p>

        Celebrating the spirit, culture,
        innovation, and unstoppable growth of
        <span class="highlight">Telangana</span>.

        <br><br>

        Dream Ladders proudly honors the vision,
        unity, and future development of our state.

    </p>

    <!-- BUTTON -->

    <button
    class="button"
    onclick="launchFlowers(event)"
    ontouchstart="launchFlowers(event)">

        Jai Telangana ✨

    </button>

    <div class="footer">
        Presented by Dream Ladders
    </div>

</div>

<script>

/* FLOWER BURST + REDIRECT */

function launchFlowers(e){

    const flowers = [
    "🌸","🌺","🌷",
    "✨","💐","🌹",
    "🪷","🌼"
    ];

    let xPos, yPos;

    if(e.touches){

        xPos = e.touches[0].clientX;
        yPos = e.touches[0].clientY;

    }else{

        xPos = e.clientX;
        yPos = e.clientY;
    }

    for(let i=0; i<40; i++){

        const flower =
        document.createElement("div");

        flower.classList.add("flower");

        flower.innerHTML =
        flowers[Math.floor(
        Math.random()*flowers.length)];

        const x =
        (Math.random()-0.5)*500 + "px";

        const y =
        (Math.random()-0.5)*500 + "px";

        flower.style.setProperty("--x",x);
        flower.style.setProperty("--y",y);

        flower.style.left =
        xPos + "px";

        flower.style.top =
        yPos + "px";

        flower.style.fontSize =
        (18 + Math.random()*18) + "px";

        document.body.appendChild(flower);

        setTimeout(()=>{

            flower.remove();

        },3000);
    }

    /* REDIRECT */

    setTimeout(()=>{

        window.location.href =
        "https://dreamladders.github.io/Main/";

    },2000);
}

</script>

</body>
</html>
