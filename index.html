<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Telangana Formation Day | Dream Ladders</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#ff008c,#6a00ff);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    position:relative;
}

/* Background Glow */

.bg-circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    animation:float 10s infinite ease-in-out;
}

.bg-circle:nth-child(1){
    width:280px;
    height:280px;
    left:-100px;
    top:10%;
}

.bg-circle:nth-child(2){
    width:200px;
    height:200px;
    right:-70px;
    bottom:10%;
    animation-duration:14s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-30px);
    }
}

/* Card */

.container{
    width:90%;
    max-width:850px;
    text-align:center;
    padding:50px 35px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
    position:relative;
    z-index:5;
    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    letter-spacing:5px;
    font-weight:600;
    margin-bottom:25px;
    opacity:0.9;
}

h1{
    font-size:clamp(2.5rem,7vw,5rem);
    line-height:1.2;
    margin-bottom:20px;
    text-shadow:0 0 20px rgba(255,255,255,0.3);
}

p{
    line-height:1.8;
    opacity:0.95;
    font-size:1.05rem;
    margin-bottom:35px;
}

.highlight{
    color:#ffe66d;
    font-weight:600;
}

/* Button */

.button{
    border:none;
    padding:16px 40px;
    border-radius:50px;
    background:white;
    color:#ff008c;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s ease;
}

.button:hover{
    transform:translateY(-4px) scale(1.05);
}

/* Flower Animation */

.flower{
    position:absolute;
    font-size:28px;
    pointer-events:none;
    animation:burst 3s linear forwards;
}

@keyframes burst{

    0%{
        transform:translate(0,0) scale(0.5) rotate(0deg);
        opacity:1;
    }

    100%{
        transform:
        translate(var(--x), var(--y))
        scale(1.5)
        rotate(360deg);

        opacity:0;
    }
}

/* Footer */

.footer{
    margin-top:30px;
    font-size:14px;
    letter-spacing:1px;
    opacity:0.8;
}

@media(max-width:768px){

    .container{
        padding:35px 25px;
    }

    p{
        font-size:0.95rem;
    }
}

</style>
</head>

<body>

<div class="bg-circle"></div>
<div class="bg-circle"></div>

<div class="container">

    <div class="logo">
        DREAM LADDERS
    </div>

    <h1>
        Happy Telangana<br>
        Formation Day ❤️
    </h1>

    <p>
        Celebrating the spirit, culture, innovation, and strength of
        <span class="highlight">Telangana</span>.
        <br><br>
        Dream Ladders proudly honors the journey of unity,
        growth, and future development.
    </p>

    <button class="button" onclick="launchFlowers(event)">
        Jai Telangana ✨
    </button>

    <div class="footer">
        Presented by Dream Ladders
    </div>

</div>

<script>

function launchFlowers(event){

    const flowers = ["🌸","🌺","🌷","✨","💐","🌹"];

    for(let i=0; i<40; i++){

        const flower = document.createElement("div");

        flower.classList.add("flower");

        flower.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];

        const x = (Math.random() - 0.5) * 800 + "px";
        const y = (Math.random() - 0.5) * 800 + "px";

        flower.style.setProperty("--x", x);
        flower.style.setProperty("--y", y);

        flower.style.left = event.clientX + "px";
        flower.style.top = event.clientY + "px";

        flower.style.fontSize = (20 + Math.random()*25) + "px";

        document.body.appendChild(flower);

        setTimeout(()=>{
            flower.remove();
        },3000);
    }
}

</script>

</body>
</html>
