<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Telangana Formation Day | Dream Ladders</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    background:linear-gradient(135deg,#ff008c,#6a00ff);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    position:relative;
}

/* Animated Background */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    animation:float 12s infinite linear;
}

.circle:nth-child(1){
    width:300px;
    height:300px;
    left:-100px;
    top:10%;
}

.circle:nth-child(2){
    width:200px;
    height:200px;
    right:-50px;
    top:60%;
    animation-duration:15s;
}

.circle:nth-child(3){
    width:150px;
    height:150px;
    left:40%;
    bottom:-60px;
    animation-duration:10s;
}

@keyframes float{
    0%{
        transform:translateY(0px) rotate(0deg);
    }
    50%{
        transform:translateY(-30px) rotate(180deg);
    }
    100%{
        transform:translateY(0px) rotate(360deg);
    }
}

/* Main Card */
.container{
    position:relative;
    z-index:2;
    text-align:center;
    width:90%;
    max-width:850px;
    padding:50px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    font-size:18px;
    letter-spacing:4px;
    font-weight:600;
    margin-bottom:25px;
    opacity:0.9;
}

h1{
    font-size:clamp(2.5rem,7vw,5rem);
    line-height:1.2;
    margin-bottom:20px;
    font-weight:700;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px rgba(255,255,255,0.4);
    }
    to{
        text-shadow:0 0 25px rgba(255,255,255,0.9);
    }
}

p{
    font-size:1.1rem;
    line-height:1.8;
    opacity:0.95;
    margin-bottom:30px;
}

.highlight{
    color:#ffe66d;
    font-weight:600;
}

.button{
    display:inline-block;
    padding:14px 34px;
    border-radius:50px;
    background:white;
    color:#ff008c;
    text-decoration:none;
    font-weight:600;
    transition:0.4s ease;
}

.button:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 10px 30px rgba(255,255,255,0.35);
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:rgba(255,255,255,0.4);
    font-size:20px;
    animation:hearts 8s linear infinite;
}

@keyframes hearts{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

.footer{
    margin-top:30px;
    font-size:14px;
    opacity:0.8;
    letter-spacing:1px;
}

/* Responsive */
@media(max-width:768px){
    .container{
        padding:35px 25px;
    }

    p{
        font-size:1rem;
    }
}
</style>
</head>

<body>

<div class="bg">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<!-- Floating Hearts -->
<div class="heart" style="left:10%; animation-delay:0s;">❤️</div>
<div class="heart" style="left:25%; animation-delay:2s;">✨</div>
<div class="heart" style="left:50%; animation-delay:4s;">❤️</div>
<div class="heart" style="left:75%; animation-delay:1s;">✨</div>
<div class="heart" style="left:90%; animation-delay:3s;">❤️</div>

<div class="container">

    <div class="logo">
        DREAM LADDERS
    </div>

    <h1>
        Happy Telangana<br>
        Formation Day ❤️
    </h1>

    <p>
        Celebrating the spirit, culture, innovation, and strength of
        <span class="highlight">Telangana</span>.
        <br><br>
        Dream Ladders proudly honors the journey of progress,
        unity, and future development.
    </p>

    <a href="#" class="button">
        Jai Telangana ✨
    </a>

    <div class="footer">
        Presented by Dream Ladders
    </div>

</div>

</body>
</html>
